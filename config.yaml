# ──────────────────────────────────────────────
# 中国传统白描连环画生成器 — 全局配置
# ──────────────────────────────────────────────

llm:
  # 可选: deepseek | kimi | minimax
  provider: deepseek
  # 温度参数 (故事创作建议 0.7–0.9)
  temperature: 0.85
  # 最大生成 tokens
  max_tokens: 2048

image:
  # 可选: runninghub | replicate | zhipu | tongyi | minimax | comfyui | dry_run
  # runninghub（默认推荐）: 中文理解强，消费级 Key 可用
  # minimax: MiniMax image-01 模型，使用 MINIMAX_API_KEY
  # replicate: 备用后端（需 API Token，可能余额不足）
  backend: runninghub
  # 输出画幅尺寸 — 每次随机选取一种比例，再随机缩放宽度
  # 选项: random（每次随机）| 也可固定指定如 4:3
  canvas_select: random
  canvas_presets:
    - name: "4:3 (classic)"
      width: 768
      height: 576
    - name: "7:5 (classic alt)"
      width: 806
      height: 576
    - name: "3:2"
      width: 864
      height: 576
    - name: "16:9 (widescreen)"
      width: 1024
      height: 576
    - name: "2:1 超宽"
      width: 1152
      height: 576
  # 宽度随机缩放基数（从列表中随机选一个作为目标宽度，高度按比例缩放）
  # 比如 4:3 预设选宽度 1024 → 高度 576*(1024/768)=768
  regen_widths: [768, 896, 1024, 1152]
  # 每批生成数量
  batch_size: 1

  # RunningHub 配置 (runninghub.cn)
  runninghub:
    model: rhart-image-g-2-official
    # 任务超时秒数（RunningHub 低价渠道通常 300-600 秒）
    timeout: 600
    # 轮询间隔秒数
    poll_interval: 2

  # 智谱 AI 配置 (open.bigmodel.cn)
  zhipu:
    # auto: 按提示词自动切换；classic_comic_first: 古典连环画优先
    model: auto
    model_strategy: classic_comic_first
    classic_model: cogView-4-250304
    text_heavy_model: glm-image
    base_url: https://open.bigmodel.cn/api/paas/v4
    timeout: 120
    quality: hd
    watermark_enabled: false

  # 通义万相配置 (DashScope / 百炼)
  tongyi:
    model: wan2.7-image-pro
    base_url: https://dashscope.aliyuncs.com/api/v1
    timeout: 120
    size: 2K
    watermark: false
    thinking_mode: true

  # MiniMax 配置 (platform.minimaxi.com)
  minimax:
    model: image-01
    timeout: 180

  # Replicate 配置
  replicate:
    model: stability-ai/sdxl:7762fd07cf82c948538e41f63f77d685e02b063e37e496e96eefd46c929f9bdc
    num_inference_steps: 30
    guidance_scale: 7.5
    lora_url: ""
    lora_scale: 0.8

  # ComfyUI 配置 (未来使用)
  comfyui:
    server_url: http://127.0.0.1:8188
    workflow_path: assets/workflows/baimiao_workflow.json

  # Vision QA 质检配置
  vision_qa:
    enabled: true
    provider: deepseek       # 复用 LLM provider 的 API Key + base_url
    retry_limit: 0           # 不合格不重试，仅跳过

  # 后期处理
  post_process:
    paper_texture: true
    paper_texture_dir: assets/paper_textures   # 宣纸纹理目录（用户自行放入扫描图）
    paper_texture_blend: 0.15                  # 纹理混合强度
    aging_effect: true
    aging_intensity: 0.35
    add_border: true
    add_narration: true                         # 合并标题+旁白+出处于底部解说条

story:
  # ─── 10大板块，每块10% ──────────────────────
  # 10大板块各约11.1% (总和100%)
  themes:
    three_kingdoms:    11.12  # 三国演义
    pre_qin:           11.11  # 东周列国（先秦）
    western_han:       11.11  # 西汉历史
    eastern_han:       11.11  # 东汉演义
    sui_tang:          11.11  # 隋唐合集
    song_dynasty:      11.11  # 宋代合集
    ming_founding:     11.11  # 明代开国演义
    general_history:   11.11  # 通史&志怪神魔合集
    late_ming_qing:    11.11  # 晚明晚清乱世演义

  # ─── 旁白风格 ──────────────────────────────
  # random = 每轮从5种风格中随机抽取
  # 也可指定具体风格: 林汉达 | 高阳 | 金庸 | 罗贯中 | 施耐庵
  narrator_style: random

  # 旁白解说词字数范围（精简短小，给画面留更多空间）
  narration_min_chars: 30
  narration_max_chars: 80

  # 避免重复题材
  avoid_recent_topics: 5